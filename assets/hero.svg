<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Obsidian Knowledge Pipeline — an MCP server that turns YouTube videos into structured Obsidian notes with SVG diagrams, tags, a live Bases index, Canvas maps, video frames, and your own writing voice">
  <defs>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#afa9ec"/>
      <stop offset="0.5" stop-color="#85b7eb"/>
      <stop offset="1" stop-color="#5dcaa5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0997b"/>
      <stop offset="0.5" stop-color="#afa9ec"/>
      <stop offset="1" stop-color="#5dcaa5"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="1196" height="356" rx="18" fill="#0b0f19" stroke="#222a3d" stroke-width="2"/>
  <rect x="2" y="2" width="1196" height="6" rx="3" fill="url(#accent)"/>

  <!-- Eyebrow -->
  <text x="64" y="64" font-size="14" font-weight="600" letter-spacing="3" fill="#5dcaa5">MODEL CONTEXT PROTOCOL · SERVER</text>

  <!-- Title -->
  <text x="62" y="130" font-size="56" font-weight="700" fill="url(#title)">Obsidian Knowledge</text>
  <text x="62" y="190" font-size="56" font-weight="700" fill="url(#title)">Pipeline</text>

  <!-- Subtitle -->
  <text x="64" y="228" font-size="18" font-weight="400" fill="#9aa3b8">Turn YouTube videos (and PDFs) into structured, cross-linked Obsidian notes —</text>
  <text x="64" y="252" font-size="18" font-weight="400" fill="#9aa3b8">modules, SVG diagrams, tags, a live Bases index, Canvas maps, and your own voice.</text>

  <!-- Pills -->
  <g font-size="13" font-weight="500">
    <rect x="64" y="278" width="104" height="26" rx="13" fill="#10182a" stroke="#2b3450"/>
    <text x="116" y="295" text-anchor="middle" fill="#b5d4f4">Python 3.13</text>
    <rect x="176" y="278" width="118" height="26" rx="13" fill="#10182a" stroke="#2b3450"/>
    <text x="235" y="295" text-anchor="middle" fill="#cecbf6">MCP · FastMCP</text>
    <rect x="302" y="278" width="64" height="26" rx="13" fill="#10182a" stroke="#2b3450"/>
    <text x="334" y="295" text-anchor="middle" fill="#9fe1cb">stdio</text>
    <rect x="374" y="278" width="108" height="26" rx="13" fill="#10182a" stroke="#2b3450"/>
    <text x="428" y="295" text-anchor="middle" fill="#fac775">no API keys</text>
    <rect x="490" y="278" width="160" height="26" rx="13" fill="#10182a" stroke="#2b3450"/>
    <text x="570" y="295" text-anchor="middle" fill="#f5c4b3">11 tools · 3 prompts</text>
  </g>

  <!-- Output montage (right) -->
  <text x="820" y="58" font-size="11.5" font-weight="600" letter-spacing="1.5" fill="#6f7891">WHAT LANDS IN YOUR VAULT</text>

  <!-- 1: colour-graded graph -->
  <rect x="820" y="70" width="320" height="60" rx="12" fill="#0e1422" stroke="#2b3450" stroke-width="1"/>
  <g>
    <line x1="848" y1="90" x2="872" y2="110" stroke="#3f7a64" stroke-width="1.4"/>
    <line x1="872" y1="110" x2="894" y2="92" stroke="#3f7a64" stroke-width="1.4"/>
    <circle cx="848" cy="90" r="6" fill="#afa9ec"/>
    <circle cx="872" cy="110" r="6" fill="#f0997b"/>
    <circle cx="894" cy="92" r="6" fill="#85b7eb"/>
    <circle cx="858" cy="114" r="4.5" fill="#5dcaa5"/>
  </g>
  <text x="924" y="95" font-size="14" font-weight="600" fill="#cfe9df">Colour-graded graph</text>
  <text x="924" y="114" font-size="11.5" fill="#9aa3b8">themes · sources · modules · tags</text>

  <!-- 2: live Base index -->
  <rect x="820" y="138" width="320" height="60" rx="12" fill="#0e1422" stroke="#2b3450" stroke-width="1"/>
  <g>
    <rect x="844" y="154" width="54" height="30" rx="5" fill="#15132e" stroke="#afa9ec" stroke-width="0.75"/>
    <line x1="850" y1="163" x2="892" y2="163" stroke="#8e8ac4" stroke-width="1.5"/>
    <line x1="850" y1="170" x2="892" y2="170" stroke="#4a4570" stroke-width="1.5"/>
    <line x1="850" y1="177" x2="880" y2="177" stroke="#4a4570" stroke-width="1.5"/>
  </g>
  <text x="924" y="163" font-size="14" font-weight="600" fill="#cecbf6">Live Obsidian Base</text>
  <text x="924" y="182" font-size="11.5" fill="#9aa3b8">per-theme index, grouped by source</text>

  <!-- 3: Canvas map -->
  <rect x="820" y="206" width="320" height="60" rx="12" fill="#0e1422" stroke="#2b3450" stroke-width="1"/>
  <g>
    <rect x="844" y="222" width="14" height="28" rx="3" fill="#1a1305" stroke="#ef9f27" stroke-width="0.75"/>
    <rect x="864" y="222" width="14" height="28" rx="3" fill="#06140f" stroke="#5dcaa5" stroke-width="0.75"/>
    <rect x="884" y="222" width="14" height="28" rx="3" fill="#11102a" stroke="#afa9ec" stroke-width="0.75"/>
  </g>
  <text x="924" y="231" font-size="14" font-weight="600" fill="#f5c4b3">Canvas maps</text>
  <text x="924" y="250" font-size="11.5" fill="#9aa3b8">a whole topic in one zoomed-out view</text>

  <!-- 4: voice + frames -->
  <rect x="820" y="274" width="320" height="60" rx="12" fill="#0e1422" stroke="#2b3450" stroke-width="1"/>
  <g stroke="#85b7eb" stroke-width="2" stroke-linecap="round">
    <line x1="846" y1="304" x2="846" y2="304"/>
    <line x1="852" y1="298" x2="852" y2="310"/>
    <line x1="858" y1="292" x2="858" y2="316"/>
    <line x1="864" y1="300" x2="864" y2="308"/>
    <line x1="870" y1="294" x2="870" y2="314"/>
    <line x1="876" y1="288" x2="876" y2="320"/>
    <line x1="882" y1="300" x2="882" y2="308"/>
    <line x1="888" y1="296" x2="888" y2="312"/>
    <line x1="894" y1="302" x2="894" y2="306"/>
  </g>
  <text x="924" y="299" font-size="14" font-weight="600" fill="#b5d4f4">Your voice · video frames</text>
  <text x="924" y="318" font-size="11.5" fill="#9aa3b8">write like you · HD frames at timestamps</text>
</svg>
