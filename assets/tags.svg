<svg viewBox="0 0 1200 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The 3 - Tags folder: each tag is its own note that defines what the concept means">
  <rect x="2" y="2" width="1196" height="466" rx="18" fill="#0b0f19" stroke="#222a3d" stroke-width="2"/>
  <text x="40" y="46" font-size="18" font-weight="600" fill="#e6e8ee">A <tspan fill="#5dcaa5">3 - Tags</tspan> folder that actually explains itself</text>
  <text x="40" y="68" font-size="13" fill="#9aa3b8">Tags aren't hashtags — each is a real note that <tspan fill="#9fe1cb">defines the concept</tspan>. The pipeline dedupes against these before creating new ones.</text>

  <!-- file tree panel -->
  <rect x="36" y="88" width="320" height="356" rx="14" fill="#0e1422" stroke="#2b3450" stroke-width="1.5"/>
  <path d="M58 116 l8 -6 h16 l4 5 h22 a3 3 0 0 1 3 3 v3 h-56 Z" fill="#5dcaa5" opacity="0.85"/>
  <rect x="58" y="121" width="56" height="22" rx="3" fill="#5dcaa5" opacity="0.85"/>
  <text x="126" y="137" font-size="14" font-weight="600" fill="#9fe1cb">3 - Tags</text>

  <g font-size="13">
    <rect x="64" y="164" width="276" height="30" rx="7" fill="#10233a" stroke="#1e7a5f" stroke-width="0.75"/>
    <text x="80" y="184" fill="#9fe1cb">▦ Order Flow.md</text>

    <text x="80" y="222" fill="#c7cede">▦ Zettelkasten.md</text>
    <text x="80" y="252" fill="#c7cede">▦ Idempotency.md</text>
    <text x="80" y="282" fill="#c7cede">▦ Quorum.md</text>
    <text x="80" y="312" fill="#c7cede">▦ Backpressure.md</text>
    <text x="80" y="342" fill="#c7cede">▦ Eventual Consistency.md</text>
    <text x="80" y="372" fill="#c7cede">▦ Time Decay.md</text>
    <text x="80" y="406" fill="#6f7891">+ stubs for genuinely new concepts</text>
  </g>

  <!-- arrow -->
  <path d="M364 270 L394 270" stroke="#9c9a92" stroke-width="2" opacity="0.7"/>
  <path d="M394 265 L402 270 L394 275 Z" fill="#9c9a92" opacity="0.8"/>

  <!-- opened tag note -->
  <rect x="412" y="88" width="752" height="356" rx="14" fill="#0e1422" stroke="#2b3450" stroke-width="1.5"/>
  <rect x="412" y="88" width="752" height="44" rx="14" fill="#141b2d"/>
  <rect x="412" y="118" width="752" height="14" fill="#141b2d"/>
  <text x="434" y="116" font-size="14" font-weight="600" fill="#9fe1cb">Order Flow.md</text>
  <text x="1148" y="116" text-anchor="end" font-size="11.5" fill="#6f7891">Reading view</text>

  <!-- frontmatter chip -->
  <rect x="436" y="150" width="704" height="30" rx="8" fill="#10182a" stroke="#2b3450"/>
  <text x="452" y="170" font-size="11.5" fill="#9aa3b8"><tspan fill="#6f7891">type:</tspan> tag   <tspan fill="#6f7891">aliases:</tspan> order book flow, tape   <tspan fill="#6f7891">theme:</tspan> Trading</text>

  <!-- H1 -->
  <text x="436" y="214" font-size="22" font-weight="700" fill="#e6e8ee">Order Flow</text>

  <!-- definition callout -->
  <rect x="436" y="232" width="704" height="74" rx="10" fill="#10233a" stroke="#1e7a5f" stroke-width="0.75"/>
  <rect x="436" y="232" width="5" height="74" rx="2.5" fill="#5dcaa5"/>
  <text x="460" y="258" font-size="12" font-weight="700" letter-spacing="1" fill="#5dcaa5">DEFINITION</text>
  <text x="460" y="282" font-size="13.5" fill="#cfe9df">The real-time stream of buy and sell orders hitting the market —</text>
  <text x="460" y="300" font-size="13.5" fill="#cfe9df">who wants in, who wants out, and how badly, moment to moment.</text>

  <!-- body lines -->
  <text x="436" y="338" font-size="13" fill="#9aa3b8">Reading order flow means watching <tspan fill="#c7cede">where size sits</tspan> rather than just price. Linked from:</text>

  <g font-size="12.5">
    <rect x="436" y="354" width="200" height="26" rx="13" fill="#10182a" stroke="#2b3450"/>
    <text x="452" y="371" fill="#b5d4f4">↳ Reading the Tape</text>
    <rect x="648" y="354" width="220" height="26" rx="13" fill="#10182a" stroke="#2b3450"/>
    <text x="664" y="371" fill="#b5d4f4">↳ Liquidity &amp; Slippage</text>
  </g>

  <text x="436" y="416" font-size="11.5" fill="#6f7891">Modules reference it as <tspan fill="#9fe1cb" font-style="italic">*tags:* [[Order Flow]]</tspan> — one shared definition, reused everywhere.</text>
</svg>
